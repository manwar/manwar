name: Metrics
on:
  schedule: [{cron: "0 */12 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: manwar
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/London
          filename: github-metrics.svg
          
          # Plugin: Followup (Status of issues/PRs)
          plugin_followup: yes
          plugin_followup_sections: user
          
          # Plugin: Isometric Calendar (The 3D view)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          
          # Plugin: Languages
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
          
          # Plugin: Habits (STABILITY FIXES ADDED)
          plugin_habits: yes
          plugin_habits_from: 200       # Only scan last 200 events
          plugin_habits_days: 14        # Only look at last 14 days
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          
          # Plugin: Achievements (STABILITY FIXES ADDED)
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_threshold: B
          plugin_achievements_limit: 10 # Don't try to fetch hundreds

name: Update Profile Stats
on:
  schedule:
    - cron: '0 0 * * *' # Runs every night at midnight
  workflow_dispatch: # Allows you to run it manually

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Fetch Stats
        run: |
          # Fetching your data from the GitHub Stats API
          curl "https://github-readme-stats.vercel.app/api?username=manwar&format=json" -o stats.json
          
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add stats.json
          git commit -m "Update profile stats JSON" || exit 0
          git push

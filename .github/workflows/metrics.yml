name: Metrics
on:
  schedule: [{cron: "0 */12 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: manwar
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/London
          filename: github-metrics.svg
          
          # Isometric Calendar (This works well, keep it!)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          
          # Languages (Limit to top languages to save time)
          plugin_languages: yes
          plugin_languages_limit: 8
          
          # Habits (STRICT LIMITS FOR LARGE ACCOUNTS)
          plugin_habits: yes
          plugin_habits_from: 50       # Scan only 50 events
          plugin_habits_days: 3        # Scan only 3 days
          plugin_habits_facts: yes
          plugin_habits_charts: no     # Charts often cause timeouts on big accounts
          
          # Achievements (STRICT LIMITS FOR LARGE ACCOUNTS)
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_threshold: B 
          plugin_achievements_limit: 5     # Only fetch top 5 badges

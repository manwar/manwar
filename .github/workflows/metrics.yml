name: Metrics
on:
  schedule: [{cron: "0 */12 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: manwar
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/London
          filename: github-metrics.svg
          
          # Working well
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          
          # LIMITS FOR LARGE ACCOUNTS (Fixes Unexpected Error)
          plugin_habits: yes
          plugin_habits_from: 50       # Reduced from 100 to 50
          plugin_habits_days: 3        # Reduced from 7 to 3
          plugin_habits_facts: yes
          plugin_habits_charts: no
          
          # LIMITS FOR ACHIEVEMENTS (Fixes Unexpected Error)
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_threshold: X # 'X' only shows the most basic medals
          plugin_achievements_limit: 5     # Minimum number of badges      

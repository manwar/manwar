name: Metrics
on:
  schedule: [{cron: "0 */12 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: manwar
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/London
          filename: github-metrics.svg
          
          # Isometric Calendar (This is working well)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          
          # Languages
          plugin_languages: yes
          plugin_languages_sections: most-used
          
          # Habits (STABILITY LIMITS)
          plugin_habits: yes
          plugin_habits_from: 100       # Only scan last 100 events
          plugin_habits_days: 7         # Only scan last 7 days
          plugin_habits_facts: yes
          plugin_habits_charts: no      # Disabling charts saves significant time
          
          # Achievements (STABILITY LIMITS)
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_threshold: B 
          plugin_achievements_limit: 10    # Fetch only the top 10

name: Update Profile Stats
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate Endpoint Files
        run: |
          # 1. Get Followers (Publicly accessible)
          FOLLOWERS=$(curl -s https://api.github.com/users/manwar | jq '.followers')
          
          # 2. Get Public Repo count
          REPOS=$(curl -s https://api.github.com/users/manwar | jq '.public_repos')
          
          # 3. Set your 'Legend' stats manually (Most reliable for 62K+ commits)
          COMMITS="62.4K"
          STARS="14.7K"

          # Create the Shields-compatible endpoint files
          echo "{\"schemaVersion\": 1, \"label\": \"Commits\", \"message\": \"$COMMITS\", \"color\": \"orange\"}" > commits_endpoint.json
          echo "{\"schemaVersion\": 1, \"label\": \"Repos\", \"message\": \"$REPOS\", \"color\": \"blue\"}" > prs_endpoint.json
          echo "{\"schemaVersion\": 1, \"label\": \"Followers\", \"message\": \"$FOLLOWERS\", \"color\": \"blueviolet\"}" > stars_endpoint.json

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add *_endpoint.json
          git commit -m "Update profile badges" || exit 0
          git push
